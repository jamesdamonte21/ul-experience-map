<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UL Experience Map — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Sora',-apple-system,sans-serif;background:#07080D;color:#E8EEFF;-webkit-font-smoothing:antialiased}

body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -5%,rgba(123,92,255,.13) 0%,transparent 65%),
             radial-gradient(ellipse 40% 40% at 80% 80%,rgba(0,89,153,.07) 0%,transparent 60%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none;
}

.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}

/* card */
.card{width:100%;max-width:400px;background:#0E1018;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:40px 36px;box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04)}

/* logo */
.logo-wrap{display:flex;justify-content:center;margin-bottom:32px}
.logo-wrap svg{height:28px;width:auto}

/* headings */
.card-title{font-size:18px;font-weight:800;letter-spacing:-.3px;color:#E8EEFF;text-align:center;margin-bottom:6px}
.card-sub{font-size:11.5px;color:#526075;text-align:center;margin-bottom:32px;font-weight:500;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.8px}

/* divider */
.divider{height:1px;background:rgba(255,255,255,.06);margin-bottom:28px}

/* form */
.field{margin-bottom:16px}
.field label{display:block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#526075;font-family:'JetBrains Mono',monospace;margin-bottom:7px}
.field input{
  width:100%;padding:11px 14px;
  background:#141720;
  border:1px solid rgba(255,255,255,.09);
  border-radius:8px;
  font-size:13px;font-family:'Sora',sans-serif;
  color:#E8EEFF;outline:none;
  transition:border-color 170ms ease,box-shadow 170ms ease;
}
.field input::placeholder{color:#3E4A5C}
.field input:focus{border-color:rgba(123,92,255,.5);box-shadow:0 0 0 3px rgba(123,92,255,.12)}

/* button */
.btn{
  width:100%;margin-top:8px;padding:12px;
  background:linear-gradient(135deg,#5B3FD6 0%,#7B5CFF 100%);
  border:none;border-radius:8px;
  font-size:13px;font-weight:700;font-family:'Sora',sans-serif;
  color:#fff;cursor:pointer;
  transition:filter 170ms ease,transform 170ms ease;
  box-shadow:0 4px 16px rgba(123,92,255,.3);
}
.btn:hover{filter:brightness(1.1)}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.5;cursor:not-allowed;filter:none}

/* error */
.error{
  margin-top:14px;padding:10px 14px;
  background:rgba(255,76,76,.1);
  border:1px solid rgba(255,76,76,.2);
  border-radius:7px;
  font-size:12px;color:#FF9090;
  display:none;
}
.error.show{display:block}

/* footer */
.footer{margin-top:28px;text-align:center;font-size:10px;color:#3E4A5C;font-family:'JetBrains Mono',monospace;letter-spacing:.4px}
</style>
</head>

      </svg>
    </div>

    <div class="card-title">Internal Experience Map</div>
    <div class="card-sub">Restricted Access</div>
    <div class="divider"></div>

    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" autocapitalize="none" spellcheck="false">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <button class="btn" type="submit" id="submitBtn">Sign In</button>
      <div class="error" id="errorMsg">Invalid username or password. Please try again.</div>
    </form>

  </div>
  <div class="footer">UL Solutions · Testing, Inspection &amp; Certification</div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// If already logged in, go straight to the app
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.replace('/index.html');
});

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');

  if (!username || !password) return;

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.classList.remove('show');

  // Map username → email used in Supabase
  const email = `${username}@ul-experience-map.app`;

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  } else {
    window.location.replace('/index.html');
  }
});
</script>
</body>
</html>
